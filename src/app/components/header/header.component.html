<header class="fixed top-0 left-0 right-0 z-50 bg-neutral-900 dark:bg-neutral-900 shadow-medium">
  <div class="max-w-6xl mx-auto px-8 py-4">
    <div class="flex justify-between items-center">
      <!-- Logo and Name Section -->
      <div class="flex items-center space-x-4">
        <!-- Logo -->
        <div class="flex-shrink-0">
          <img 
            src="assets/logo-bg-white-svg.svg" 
            alt="Byron Gonzalez Logo" 
            class="h-12 w-auto"
          />
        </div>
        <!-- Name and Title 
        <div class="flex flex-col">
          <div class="text-2xl font-bold text-white tracking-tight">
            Byron Gonzalez
          </div>
          <div class="text-sm font-medium text-primary-400 tracking-wide uppercase">
            Technical Lead
          </div>
        </div>-->
      </div>
      
      <!-- Navigation Links -->
      <nav class="hidden md:flex items-center space-x-6">
        <a href="#experience" class="text-neutral-300 hover:text-white transition-colors font-medium">{{ isEnglish ? 'Experience' : 'Experiencia' }}</a>
        <a href="#projects" class="text-neutral-300 hover:text-white transition-colors font-medium">{{ isEnglish ? 'Projects' : 'Proyectos' }}</a>
        <a href="#skills" class="text-neutral-300 hover:text-white transition-colors font-medium">{{ isEnglish ? 'Skills' : 'Habilidades' }}</a>
        <a href="#education" class="text-neutral-300 hover:text-white transition-colors font-medium">{{ isEnglish ? 'Education' : 'Educación' }}</a>
        <a href="#languages" class="text-neutral-300 hover:text-white transition-colors font-medium">{{ isEnglish ? 'Languages' : 'Idiomas' }}</a>
        <a href="#certifications" class="text-neutral-300 hover:text-white transition-colors font-medium">{{ isEnglish ? 'Certifications' : 'Certificaciones' }}</a>
      </nav>

      <div class="flex items-center space-x-3">
        <!-- Language Toggle -->
        <button 
          (click)="toggleLanguage()"
          class="group flex items-center space-x-2 px-4 py-2.5 rounded-xl bg-neutral-800/80 hover:bg-neutral-700/80 transition-all duration-300 border border-neutral-700/50 hover:shadow-soft"
          [attr.aria-label]="isEnglish ? 'Switch to Spanish' : 'Switch to English'">
          <svg class="w-4 h-4 text-primary-400 group-hover:text-primary-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
          </svg>
          <span class="text-sm font-semibold text-neutral-300 group-hover:text-white transition-colors">
            {{ isEnglish ? 'ES' : 'EN' }}
          </span>
        </button>

        <!-- Theme Toggle -->
        <button 
          (click)="toggleTheme()"
          class="group flex items-center justify-center w-11 h-11 rounded-xl bg-neutral-800/80 hover:bg-neutral-700/80 transition-all duration-300 border border-neutral-700/50 hover:shadow-soft"
          [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
          <svg *ngIf="!isDarkMode" class="w-5 h-5 text-neutral-300 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
          <svg *ngIf="isDarkMode" class="w-5 h-5 text-yellow-400 group-hover:text-yellow-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>
